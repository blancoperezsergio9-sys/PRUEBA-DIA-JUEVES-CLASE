<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecaKids Ultra Pro - Ecosistema Avanzado de Alfabetismo Físico</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { brand: { 500: '#4f46e5', 600: '#4338ca' } } }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-200 dark:bg-slate-950 dark:text-slate-100 min-h-screen">
    
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const namesClass1 = ["Hugo T.", "Sofía M.", "Mateo R.", "Leo G.", "Lucas P.", "Martín S.", "Daniel N.", "Alejandro V.", "Manuel B.", "Álvaro J.", "Adrián C.", "Enzo F.", "Mario L.", "Diego H.", "Marcos A.", "Eva D.", "Alba G.", "Emma R.", "Daniela M.", "Noa S.", "Valeria P.", "Claudia K.", "María L.", "Lucía F.", "Martina J.", "Alma N.", "Chloe B.", "Mía V.", "Carmen C.", "Elena G."];
        const namesClass2 = ["Pablo M.", "Sergio T.", "Jorge R.", "Iván L.", "Carlos V.", "Miguel B.", "David A.", "Álex J.", "Bruno F.", "Óliver S.", "Thiago H.", "Fabio C.", "Gonzalo G.", "Izan M.", "Gael N.", "Eric P.", "Julia D.", "Sara R.", "Lara M.", "Inés S.", "Vega V.", "Paula B.", "Irene F.", "Alicia C.", "Clara G.", "Ainara L.", "Olivia H.", "Ainhoa M.", "Nerea J.", "Rocío P."];
        const namesClass3 = ["Javier R.", "Héctor M.", "Rubén G.", "Víctor S.", "Raúl F.", "Isaac L.", "Samuel B.", "Ismael A.", "Francisco T.", "José H.", "Juan C.", "Tomás V.", "Nicolás P.", "Alan M.", "Denis G.", "Alberto J.", "Marta S.", "Ana B.", "Belén R.", "Andrea M.", "Natalia F.", "Celia C.", "Cristina G.", "Laura L.", "Marina H.", "Silvia V.", "Rebeca P.", "Nuria D.", "Ángela M.", "Leire J."];

        const motorProfiles = ["Especialista Locomoción", "Destreza Manipulativa", "Control de Estabilidad", "Perfil Equilibrado", "Desarrollo en Progreso"];
        const learningStyles = ["Reto Individual", "Cooperativo", "Descubrimiento Guiado", "Asignación de Tareas", "Resolución de Problemas"];
        const currentMissions = ["El vuelo del proyectil", "La senda del ninja", "Equilibrio en el abismo", "El circuito de postas", "Lanzamiento con diana"];
        
        const ludotecaJuegos = [
            { id: 1, name: "Canguros al rescate", objetivo: "Locomoción (Saltos pliométricos)", desc: "Los niños deben cruzar el espacio saltando a pies juntos dentro de aros. Si se cae un aro, un compañero debe reponerlo.", variante: "Añadir lanzamientos de saquitos de arena mientras saltan.", icono: "🦘" },
            { id: 2, name: "El Pañuelo Multimotor", objetivo: "Velocidad de reacción y Agilidad", desc: "Al decir su número, los alumnos deben salir corriendo, esquivar tres conos en zigzag y atrapar el pañuelo.", variante: "El regreso al origen se hace con cuadrupedia o pata coja.", icono: "🎽" },
            { id: 3, name: "Cazadores de Cohetes", objetivo: "Manipulación (Lanzamiento adaptado)", desc: "Lanzar jabalinas de espuma o vortex intentando que pasen a través de grandes aros suspendidos.", variante: "Aumentar la distancia de tiro gradualmente según aciertos.", icono: "🚀" },
            { id: 4, name: "El puente colgante", objetivo: "Estabilidad y Control Postural", desc: "Caminar sobre líneas en el suelo o bancos suecos portando un saquito en la cabeza sin que se caiga.", variante: "Cruzar el banco de espaldas o con los ojos semicerrados.", icono: "🪵" },
            { id: 5, name: "La fortaleza móvil", objetivo: "Estrategia cooperativa y Percepción", desc: "Por parejas, uno protege un cono gigante con un escudo flotador y el otro intenta derribar los conos lanzando pelotas blandas.", variante: "Lanzar exclusivamente con la mano no dominante.", icono: "🏰" }
        ];

        const generateClassData = (className, namesArray, stage, baseAge) => {
            return {
                name: className,
                stage: stage,
                athletes: namesArray.map((name, index) => {
                    const seed = index + baseAge;
                    return {
                        id: index + 1,
                        name: name,
                        profile: motorProfiles[index % motorProfiles.length],
                        style: learningStyles[(index + 2) % learningStyles.length],
                        mission: currentMissions[index % currentMissions.length],
                        skills: {
                            locomocion: 40 + (seed * 7) % 56,
                            estabilidad: 45 + (seed * 5) % 51,
                            manipulacion: 35 + (seed * 9) % 61
                        },
                        alpha: {
                            peso: Math.round(22 + (baseAge * 2.5) + (index % 7)),
                            altura: Math.round(110 + (baseAge * 5) + (index % 12)),
                            salto: Math.round(100 + (baseAge * 6) + (index * 2) % 45),
                            fuerza: Math.round(8 + (baseAge * 1.2) + (index % 6))
                        },
                        rpe: 2 + (index % 6),
                        wellness: {
                            sueno: 3 + (index % 3),
                            energia: 3 + (seed % 3)
                        },
                        asistencia: true,
                        logros: ["Pionero"]
                    };
                })
            };
        };

        const initialDataset = [
            generateClassData("Clase A (Fase del Descubrimiento)", namesClass1, "Etapa de Fundamentos (6-7 años)", 6),
            generateClassData("Clase B (Fase de Consolidación)", namesClass2, "Etapa de Aprendizaje Motor (8-9 años)", 8),
            generateClassData("Clase C (Fase de Especialización Base)", namesClass3, "Etapa de Rendimiento Lúdico (10-12 años)", 10)
        ];

        // Componente Radar simplificado y ultra seguro
        const SkillsRadar = ({ locomocion, estabilidad, manipulacion, isDarkMode }) => {
            const gridColor = isDarkMode ? "#334155" : "#cbd5e1";
            
            const getPos = (val, angle) => {
                const r = (val / 100) * 65;
                const rad = (angle * Math.PI) / 180;
                return { x: 100 + r * Math.cos(rad), y: 100 + r * Math.sin(rad) };
            };

            const p1 = getPos(locomocion || 0, -90);
            const p2 = getPos(estabilidad || 0, 30);
            const p3 = getPos(manipulacion || 0, 150);

            return (
                <div className="relative flex justify-center items-center my-2">
                    <svg width="200" height="200" className="overflow-visible">
                        {[20, 40, 60, 80, 100].map(lvl => {
                            const l1 = getPos(lvl, -90), l2 = getPos(lvl, 30), l3 = getPos(lvl, 150);
                            return (
                                <polygon key={lvl} points={`${l1.x},${l1.y} ${l2.x},${l2.y} ${l3.x},${l3.y}`} 
                                    fill="none" stroke={gridColor} strokeWidth="1" strokeDasharray={lvl === 100 ? "0" : "3 3"} />
                            )
                        })}
                        
                        <line x1="100" y1="100" x2={getPos(100, -90).x} y2={getPos(100, -90).y} stroke={gridColor} strokeWidth="1" />
                        <line x1="100" y1="100" x2={getPos(100, 30).x} y2={getPos(100, 30).y} stroke={gridColor} strokeWidth="1" />
                        <line x1="100" y1="100" x2={getPos(100, 150).x} y2={getPos(100, 150).y} stroke={gridColor} strokeWidth="1" />

                        <polygon points={`${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}`} fill="rgba(79, 70, 229, 0.3)" stroke="#4f46e5" strokeWidth="2" />
                        <circle cx={p1.x} cy={p1.y} r="4" fill="#4f46e5" />
                        <circle cx={p2.x} cy={p2.y} r="4" fill="#10b981" />
                        <circle cx={p3.x} cy={p3.y} r="4" fill="#f43f5e" />
                    </svg>
                </div>
            );
        };

        const DashboardView = ({ classes, classIdx }) => {
            const currentClass = classes[classIdx];
            
            let totalMotor = 0, totalRpe = 0, alerts = 0, present = 0;
            currentClass.athletes.forEach(a => {
                totalMotor += (a.skills.locomocion + a.skills.estabilidad + a.skills.manipulacion) / 3;
                totalRpe += a.rpe;
                if (a.rpe > 6) alerts++;
                if (a.asistencia) present++;
            });
            
            const avgMotor = Math.round(totalMotor / currentClass.athletes.length);
            const avgRpe = (totalRpe / currentClass.athletes.length).toFixed(1);
            const attendanceRate = Math.round((present / currentClass.athletes.length) * 100);

            return (
                <div className="space-y-6 animate-fade">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800 shadow-sm">
                            <div className="text-xs font-bold text-slate-400 uppercase">Índice Motor Medio</div>
                            <div className="text-2xl font-black mt-1 text-indigo-600 dark:text-indigo-400">{avgMotor} / 100</div>
                        </div>
                        <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800 shadow-sm">
                            <div className="text-xs font-bold text-slate-400 uppercase">Carga Percibida (RPE)</div>
                            <div className="text-2xl font-black mt-1 text-emerald-500">{avgRpe} / 10</div>
                        </div>
                        <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800 shadow-sm">
                            <div className="text-xs font-bold text-slate-400 uppercase">Alertas por Fatiga</div>
                            <div className="text-2xl font-black mt-1 text-rose-500">{alerts} Críticas</div>
                        </div>
                        <div className="bg-white dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800 shadow-sm">
                            <div className="text-xs font-bold text-slate-400 uppercase">Asistencia Hoy</div>
                            <div className="text-2xl font-black mt-1 text-amber-500">{attendanceRate}%</div>
                        </div>
                    </div>

                    <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl border dark:border-slate-800 shadow-sm">
                        <h3 className="font-bold text-sm uppercase text-slate-500 mb-4">🎯 Distribución de Carga en Alumnos Críticos</h3>
                        <div className="space-y-3">
                            {currentClass.athletes.slice(0, 5).map(a => (
                                <div key={a.id} className="flex items-center justify-between text-xs">
                                    <span className="font-bold w-24 truncate">{a.name}</span>
                                    <div className="flex-1 mx-4 bg-slate-100 dark:bg-slate-800 h-3 rounded-full overflow-hidden">
                                        <div className="bg-indigo-600 h-full" style={{ width: ((a.skills.locomocion + a.skills.estabilidad + a.skills.manipulacion)/3) + '%' }}></div>
                                    </div>
                                    <span className="font-mono text-slate-400">RPE: {a.rpe}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const AthleteView = ({ classes, classIdx, athleteId, setClasses, isDarkMode }) => {
            const currentClass = classes[classIdx];
            const athlete = currentClass.athletes.find(a => a.id === athleteId) || currentClass.athletes[0];

            const handleSkillChange = (key, value) => {
                setClasses(prev => prev.map((c, cI) => {
                    if (cI !== classIdx) return c;
                    return {
                        ...c,
                        athletes: c.athletes.map(a => a.id === athleteId ? { ...a, skills: { ...a.skills, [key]: parseInt(value) || 0 } } : a)
                    };
                }));
            };

            const globalScore = Math.round((athlete.skills.locomocion + athlete.skills.estabilidad + athlete.skills.manipulacion) / 3);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade">
                    <div className="lg:col-span-2 space-y-6">
                        <div className="bg-gradient-to-tr from-indigo-950 via-indigo-900 to-slate-900 text-white p-6 rounded-3xl shadow-md flex justify-between items-center">
                            <div>
                                <span className="bg-white/10 text-xs px-2.5 py-1 rounded-md uppercase tracking-wider font-mono">ID-{athlete.id}</span>
                                <h2 className="text-2xl font-black mt-2">{athlete.name}</h2>
                                <p className="text-indigo-200 text-xs mt-1">{currentClass.stage}</p>
                                <div className="flex flex-wrap gap-2 mt-3">
                                    <span className="bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 text-[10px] font-bold px-2 py-0.5 rounded-md">{athlete.profile}</span>
                                    <span className="bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 text-[10px] font-bold px-2 py-0.5 rounded-md">Estilo: {athlete.style}</span>
                                </div>
                            </div>
                            <div className="bg-slate-900/50 p-4 rounded-2xl border border-white/10 text-center min-w-[100px]">
                                <div className="text-[9px] uppercase tracking-wider text-indigo-300 font-bold">Índice Global</div>
                                <div className="text-4xl font-black mt-1">{globalScore}</div>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl border dark:border-slate-800 shadow-sm">
                            <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-4">⚙️ Reajuste Psicomotriz Reales</h3>
                            <div className="space-y-4">
                                {[
                                    { k: 'locomocion', l: 'Locomoción (Carrera/Salto)', c: 'accent-indigo-600 text-indigo-600' },
                                    { k: 'estabilidad', l: 'Estabilidad (Giro/Equilibrio)', c: 'accent-emerald-600 text-emerald-600' },
                                    { k: 'manipulacion', l: 'Manipulación (Lanzamiento/Recepción)', c: 'accent-rose-600 text-rose-600' }
                                ].map(s => (
                                    <div key={s.k} className="bg-slate-50 dark:bg-slate-800/40 p-3 rounded-xl">
                                        <div className="flex justify-between text-xs font-bold mb-1">
                                            <span>{s.l}</span>
                                            <span className={s.c}>{athlete.skills[s.k]}%</span>
                                        </div>
                                        <input type="range" min="10" max="100" value={athlete.skills[s.k]} onChange={e => handleSkillChange(s.k, e.target.value)} className={`w-full ${s.c.split(' ')[0]}`} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="space-y-6">
                        <div className="bg-white dark:bg-slate-900 p-4 rounded-3xl border dark:border-slate-800 shadow-sm flex flex-col items-center">
                            <span className="text-xs font-bold uppercase text-slate-400 mb-2">Biometría Funcional</span>
                            <SkillsRadar {...athlete.skills} isDarkMode={isDarkMode} />
                        </div>
                        <div className="bg-white dark:bg-slate-900 p-4 rounded-3xl border dark:border-slate-800 shadow-sm">
                            <h4 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-3 text-center">🧠 Wellness</h4>
                            <div className="grid grid-cols-2 gap-2 text-center">
                                <div className="bg-indigo-50 dark:bg-indigo-950/40 p-3 rounded-xl">
                                    <div className="text-[18px]">😴</div>
                                    <div className="font-black text-indigo-600 dark:text-indigo-400 text-sm mt-1">{athlete.wellness.sueno}/5</div>
                                </div>
                                <div className="bg-emerald-50 dark:bg-emerald-950/40 p-3 rounded-xl">
                                    <div className="text-[18px]">⚡</div>
                                    <div className="font-black text-emerald-600 dark:text-emerald-400 text-sm mt-1">{athlete.wellness.energia}/5</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const CoachView = ({ classes, classIdx, setClasses, searchQuery, setSearchQuery }) => {
            const currentClass = classes[classIdx];
            const filteredAthletes = currentClass.athletes.filter(a => a.name.toLowerCase().includes(searchQuery.toLowerCase()));

            const toggleAttendance = (id) => {
                setClasses(prev => prev.map((c, cI) => {
                    if (cI !== classIdx) return c;
                    return { ...c, athletes: c.athletes.map(a => a.id === id ? { ...a, asistencia: !a.asistencia } : a) };
                }));
            };

            const changeRpe = (id, val) => {
                setClasses(prev => prev.map((c, cI) => {
                    if (cI !== classIdx) return c;
                    return { ...c, athletes: c.athletes.map(a => a.id === id ? { ...a, rpe: Math.min(Math.max(parseInt(val) || 0, 1), 10) } : a) };
                }));
            };

            return (
                <div className="bg-white dark:bg-slate-900 rounded-3xl border dark:border-slate-800 shadow-sm overflow-hidden animate-fade">
                    <div className="p-4 bg-slate-100 dark:bg-slate-800 flex flex-col sm:flex-row gap-3 justify-between items-center border-b dark:border-slate-700">
                        <span className="font-bold text-xs uppercase tracking-wider">Registro Diario</span>
                        <input type="text" placeholder="🔍 Buscar alumno..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full sm:w-64 bg-white dark:bg-slate-900 border dark:border-slate-700 px-3 py-1.5 rounded-xl text-xs outline-none" />
                    </div>
                    <div className="divide-y divide-slate-100 dark:divide-slate-800 max-h-[480px] overflow-y-auto">
                        {filteredAthletes.map(a => (
                            <div key={a.id} className={`p-4 flex justify-between items-center gap-4 ${!a.asistencia ? 'opacity-40' : ''}`}>
                                <div className="flex items-center gap-3">
                                    <button onClick={() => toggleAttendance(a.id)} className={`w-5 h-5 rounded flex items-center justify-center text-[10px] font-bold border ${a.asistencia ? 'bg-indigo-600 text-white border-indigo-600' : 'border-slate-300'}`}>
                                        {a.asistencia && "✓"}
                                    </button>
                                    <div>
                                        <h4 className="font-bold text-sm">{a.name}</h4>
                                        <p className="text-[10px] text-slate-400">ID-{a.id} • {a.mission}</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <label className="text-[10px] font-bold text-slate-400">RPE:</label>
                                    <input type="number" min="1" max="10" value={a.rpe} onChange={e => changeRpe(a.id, e.target.value)} disabled={!a.asistencia} className="w-12 bg-slate-50 dark:bg-slate-800 text-center font-bold text-xs p-1.5 rounded-lg border dark:border-slate-700" />
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const AlphaView = ({ classes, classIdx, setClasses }) => {
            const currentClass = classes[classIdx];

            const handleAlphaChange = (id, metric, val) => {
                setClasses(prev => prev.map((c, cI) => {
                    if (cI !== classIdx) return c;
                    return {
                        ...c,
                        athletes: c.athletes.map(a => a.id === id ? { ...a, alpha: { ...a.alpha, [metric]: parseFloat(val) || 0 } } : a)
                    };
                }));
            };

            const getZone = (salto) => {
                if (salto < 115) return { t: "Bajo", s: "bg-rose-50 text-rose-600" };
                if (salto < 140) return { t: "Saludable", s: "bg-emerald-50 text-emerald-600" };
                return { t: "Excelente", s: "bg-purple-50 text-purple-600" };
            };

            return (
                <div className="bg-white dark:bg-slate-900 rounded-3xl border dark:border-slate-800 p-6 shadow-sm overflow-x-auto animate-fade hide-scrollbar">
                    <h3 className="text-base font-black mb-4">📏 Protocolo ALPHA-Fitness</h3>
                    <table className="w-full text-left text-xs min-w-[600px]">
                        <thead className="bg-slate-50 dark:bg-slate-800 text-slate-400 border-b dark:border-slate-700">
                            <tr><th className="p-3">Alumno</th><th className="p-3">Masa (kg)</th><th className="p-3">Estatura (cm)</th><th className="p-3">Salto (cm)</th><th className="p-3">Zona</th><th className="p-3">Fuerza (kg)</th></tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                            {currentClass.athletes.map(a => {
                                const z = getZone(a.alpha.salto);
                                return (
                                    <tr key={a.id} className="hover:bg-slate-50/50 dark:hover:bg-slate-800/30">
                                        <td className="p-3 font-bold">{a.name}</td>
                                        <td className="p-3"><input type="number" value={a.alpha.peso} onChange={e => handleAlphaChange(a.id, 'peso', e.target.value)} className="w-16 bg-transparent outline-none" /></td>
                                        <td className="p-3"><input type="number" value={a.alpha.altura} onChange={e => handleAlphaChange(a.id, 'altura', e.target.value)} className="w-16 bg-transparent outline-none" /></td>
                                        <td className="p-3"><input type="number" value={a.alpha.salto} onChange={e => handleAlphaChange(a.id, 'salto', e.target.value)} className="w-16 bg-transparent font-black text-indigo-600 outline-none" /></td>
                                        <td className="p-3"><span className={`px-2 py-0.5 rounded text-[10px] font-bold ${z.s}`}>{z.t}</span></td>
                                        <td className="p-3"><input type="number" value={a.alpha.fuerza} onChange={e => handleAlphaChange(a.id, 'fuerza', e.target.value)} className="w-16 bg-transparent outline-none" /></td>
                                    </tr>
                                )
                            })}
                        </tbody>
                    </table>
                </div>
            );
        };

        function DecaKidsApp() {
            const [view, setView] = useState('dashboard');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [classes, setClasses] = useState(initialDataset);
            const [classIdx, setClassIdx] = useState(0);
            const [athleteId, setAthleteId] = useState(1);
            const [searchQuery, setSearchQuery] = useState("");
            const [ludoIdx, setLudoIdx] = useState(0);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const activeClass = classes[classIdx] || classes[0];
            const activeAthlete = activeClass.athletes.find(a => a.id === athleteId) || activeClass.athletes[0];

            return (
                <div className="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8 space-y-6">
                    <header className="bg-white dark:bg-slate-900 p-4 rounded-3xl border dark:border-slate-800 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-black text-xl shadow-md">D</div>
                            <div>
                                <h1 className="text-xl font-black">DecaKids <span className="text-indigo-600">ULTRA PRO</span></h1>
                                <p className="text-[10px] text-slate-400 font-bold uppercase">Plataforma Estable v2.0</p>
                            </div>
                        </div>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="bg-slate-100 dark:bg-slate-800 p-2 rounded-xl hover:bg-slate-200 transition-colors">{isDarkMode ? '☀️' : '🌙'}</button>
                    </header>

                    <nav className="bg-slate-200/60 dark:bg-slate-900 p-1.5 rounded-2xl flex gap-1 overflow-x-auto hide-scrollbar border dark:border-slate-800">
                        {[{ id: 'dashboard', i: '📊', l: 'Dashboard' }, { id: 'athlete', i: '👤', l: 'Alumno' }, { id: 'coach', i: '📋', l: 'Evaluación' }, { id: 'alpha', i: '📏', l: 'ALPHA' }, { id: 'family', i: '🏠', l: 'Ludoteca' }].map(t => (
                            <button key={t.id} onClick={() => setView(t.id)} className={`flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-xs font-bold whitespace-nowrap ${view === t.id ? 'bg-white dark:bg-slate-800 text-indigo-600 shadow-sm' : 'text-slate-500'}`}>
                                <span>{t.i}</span>{t.l}
                            </button>
                        ))}
                    </nav>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] font-bold uppercase text-slate-400">Grupo</label>
                            <select value={classIdx} onChange={e => { const idx = parseInt(e.target.value); setClassIdx(idx); setAthleteId(classes[idx].athletes[0].id); }} className="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 p-3 rounded-xl text-xs font-bold outline-none">
                                {classes.map((c, i) => <option key={i} value={i}>{c.name}</option>)}
                            </select>
                        </div>
                        {(view === 'athlete' || view === 'family') && (
                            <div className="flex flex-col gap-1">
                                <label className="text-[10px] font-bold uppercase text-slate-400">Alumno</label>
                                <select value={athleteId} onChange={e => setAthleteId(parseInt(e.target.value))} className="w-full bg-indigo-50/60 dark:bg-indigo-950/20 border border-indigo-100/50 p-3 rounded-xl text-xs font-bold text-indigo-700 outline-none">
                                    {activeClass.athletes.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                </select>
                            </div>
                        )}
                    </div>

                    <main>
                        {view === 'dashboard' && <DashboardView classes={classes} classIdx={classIdx} />}
                        {view === 'athlete' && <AthleteView classes={classes} classIdx={classIdx} athleteId={athleteId} setClasses={setClasses} isDarkMode={isDarkMode} />}
                        {view === 'coach' && <CoachView classes={classes} classIdx={classIdx} setClasses={setClasses} searchQuery={searchQuery} setSearchQuery={setSearchQuery} />}
                        {view === 'alpha' && <AlphaView classes={classes} classIdx={classIdx} setClasses={setClasses} />}
                        {view === 'family' && (
                            <div className="p-6 bg-teal-800 text-white rounded-3xl">
                                <h3 className="font-black text-lg">🏠 Ludoteca para {activeAthlete.name}</h3>
                                <p className="mt-2 text-sm text-teal-100">Fomenta el juego libre y variado en espacios abiertos para mejorar la capacidad de adaptación motriz, según recomienda la evidencia actual en educación física base.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DecaKidsApp />);
    </script>
</body>
</html>
